<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteIQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .space-y-3 > * + * { margin-top: 0.75rem; }
        .space-y-2 > * + * { margin-top: 0.5rem; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.5rem; overflow: hidden; }
        .card-content { padding: 1.5rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; width: 100%; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: scale(1.02); }
        .btn-primary:disabled { background: #1e40af; cursor: not-allowed; opacity: 0.5; }
        .btn-outline { background: transparent; color: white; border: 1px solid #475569; padding: 0.5rem 1rem; width: auto; }
        .btn-outline:hover { background: #1e293b; }
        .btn-success { background: #22c55e; color: white; }
        .btn-success:hover { background: #16a34a; }
        .grid { display: grid; gap: 1rem; }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 768px) {
            .md-grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
            .md-grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        }
        .stat-card { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; }
        .stat-label { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
        #map { width: 100%; height: 400px; background: #0f172a; }
        .route-card { transition: transform 0.2s; cursor: pointer; }
        .route-card:hover { transform: scale(1.03); }
        .alert { border-left: 4px solid; padding: 1rem; margin-bottom: 0.5rem; border-radius: 0.25rem; display: flex; align-items: center; gap: 0.75rem; }
        .alert-urgent { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .alert-info { border-color: #3b82f6; background: #0f172a; }
        .alert-success { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .loading { display: flex; align-items: center; justify-content: center; height: 400px; flex-direction: column; gap: 1rem; }
        .spinner { border: 3px solid #1e293b; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.25rem; }
        .badge-green { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .badge-red { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-yellow { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .incident { background: #020617; padding: 0.75rem; border-radius: 0.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .text-xl { font-size: 1.25rem; }
        .text-lg { font-size: 1.125rem; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: bold; }
        .font-semibold { font-weight: 600; }
        .text-gray-300 { color: #d1d5db; }
        .text-gray-400 { color: #9ca3af; }
        .text-gray-500 { color: #6b7280; }
        .text-orange-400 { color: #fb923c; }
        .text-green-400 { color: #4ade80; }
        .hidden { display: none; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mt-3 { margin-top: 0.75rem; }
        .p-4 { padding: 1rem; }
        #navigation-status { padding: 1rem; background: #020617; }
        .active-route { border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        input, select { 
            width: 100%; 
            padding: 0.75rem; 
            border-radius: 0.5rem; 
            border: 1px solid #475569; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: #3b82f6; 
        }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #94a3b8; 
            font-size: 0.875rem; 
        }
        .modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: #0f172a; 
            border-radius: 0.5rem; 
            padding: 2rem; 
            max-width: 500px; 
            width: 90%; 
            border: 1px solid #1e293b;
        }
        .close-modal { 
            float: right; 
            font-size: 1.5rem; 
            cursor: pointer; 
            color: #94a3b8;
        }
        .close-modal:hover { color: white; }
        .time-input { display: block; }
        .bus-schedule { 
            display: none;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .bus-schedule.active { display: block; }
        .bus-time-option { 
            padding: 0.5rem;
            margin-bottom: 0.25rem;
            cursor: pointer;
            border-radius: 0.25rem;
            transition: background 0.2s;
        }
        .bus-time-option:hover {
            background: #1e293b;
        }
        .bus-time-option.next-bus {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="space-y-6">
            <h1 style="font-size: 2.25rem; font-weight: bold; margin-bottom: 1.5rem;">🚌 GoBus Live</h1>
            
            <!-- Trip Planner -->
            <div class="card">
                <div class="card-content">
                    <h2 class="text-xl font-bold mb-3">🎯 Plan Your Trip</h2>
                    <div class="grid md-grid-cols-3 gap-3">
                        <div>
                            <label>From</label>
                            <select id="origin-type" onchange="handleOriginType()" style="margin-bottom: 0.5rem;">
                                <option value="current">Current Location (GPS)</option>
                                <option value="station">GO Bus Station</option>
                                <option value="custom">Custom Address</option>
                            </select>
                            <select id="origin-station-select" class="hidden" onchange="setOriginStation()">
                                <option value="">-- Select a GO Station --</option>
                                <option value="43.4675,-79.6983">Oakville GO Station</option>
                                <option value="43.3255,-79.7990">Burlington GO Station</option>
                                <option value="43.2557,-79.8711">Hamilton GO Centre</option>
                                <option value="43.4499,-79.8661">Aldershot GO Station</option>
                                <option value="43.5890,-79.6441">Port Credit GO Station</option>
                                <option value="43.6426,-79.3871">Union Station (Toronto)</option>
                                <option value="43.5448,-79.5647">Long Branch GO Station</option>
                                <option value="43.5316,-79.5914">Clarkson GO Station</option>
                                <option value="43.6529,-79.3849">Exhibition GO Station</option>
                                <option value="43.2163,-79.8492">West Harbour GO Station (Hamilton)</option>
                                <option value="43.7315,-79.7624">Milton GO Station</option>
                                <option value="43.5320,-79.6391">Lakeshore West - Mimico GO</option>
                            </select>
                            <div id="origin-custom-wrapper" class="hidden">
                                <input type="text" id="origin" placeholder="Enter address" value="">
                            </div>
                            <div id="origin-current-wrapper">
                                <div class="flex gap-2">
                                    <input type="text" id="origin-current" placeholder="Getting location..." value="Current Location" disabled style="flex: 1; opacity: 0.7;">
                                    <button type="button" class="btn btn-outline" onclick="refreshCurrentLocation()">🔄 Refresh</button>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label>To (Bus Station)</label>
                            <select id="destination-type" onchange="handleDestinationType()" style="margin-bottom: 0.5rem;">
                                <option value="custom">Custom Address</option>
                                <option value="station">GO Bus Station</option>
                            </select>
                            <select id="station-select" class="hidden" onchange="setStationDestination()">
                                <option value="">-- Select a GO Station --</option>
                                <option value="43.4675,-79.6983">Oakville GO Station</option>
                                <option value="43.3255,-79.7990">Burlington GO Station</option>
                                <option value="43.2557,-79.8711">Hamilton GO Centre</option>
                                <option value="43.4499,-79.8661">Aldershot GO Station</option>
                                <option value="43.5890,-79.6441">Port Credit GO Station</option>
                                <option value="43.6426,-79.3871">Union Station (Toronto)</option>
                                <option value="43.5448,-79.5647">Long Branch GO Station</option>
                                <option value="43.5316,-79.5914">Clarkson GO Station</option>
                                <option value="43.6529,-79.3849">Exhibition GO Station</option>
                                <option value="43.2163,-79.8492">West Harbour GO Station (Hamilton)</option>
                                <option value="43.7315,-79.7624">Milton GO Station</option>
                                <option value="43.5320,-79.6391">Lakeshore West - Mimico GO</option>
                            </select>
                            <input type="text" id="destination" placeholder="e.g. Oakville GO Station or any address" value="">
                        </div>
                        <div>
                            <label>Travel Mode</label>
                            <select id="travel-mode" onchange="handleTravelModeChange()" style="margin-bottom: 0.5rem;">
                                <option value="arrive-by">Arrive By (Time)</option>
                                <option value="catch-bus">Catch Specific Bus</option>
                            </select>
                            <input type="time" id="arrival-time" value="" class="time-input">
                            <select id="bus-schedule" class="hidden bus-schedule">
                                <option value="">-- Select Bus Departure --</option>
                            </select>
                            <div id="next-buses-info" class="hidden" style="margin-top: 0.5rem; padding: 0.75rem; background: #020617; border-radius: 0.5rem; font-size: 0.875rem;">
                                <p class="text-gray-400" style="margin-bottom: 0.5rem;">📅 Next Available Buses:</p>
                                <div id="upcoming-buses"></div>
                            </div>
                        </div>
                    </div>
                    <button onclick="calculateRoutes()" class="btn btn-success" style="margin-top: 1rem;">
                        🔍 Find Routes & Leave Times
                    </button>
                </div>
            </div>
            
            <!-- Smart Alerts -->
            <div id="alerts"></div>
            
            <!-- Google Maps -->
            <div class="card">
                <div id="map-loading" class="loading">
                    <div class="spinner"></div>
                    <p class="text-gray-400">Loading map...</p>
                </div>
                <div id="map" style="display: none;"></div>
                <div id="navigation-status" class="hidden">
                    <div class="flex justify-between items-center">
                        <span id="nav-text" class="font-semibold"></span>
                        <button onclick="stopNavigation()" class="btn btn-outline">Stop</button>
                    </div>
                </div>
            </div>
            
            <!-- Lifetime Stats -->
            <div class="card">
                <div class="card-content">
                    <div class="grid grid-cols-2 md-grid-cols-4">
                        <div class="stat-card">
                            <div class="stat-value" id="stat-trips">1247</div>
                            <div class="stat-label">Trips</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-time">382</div>
                            <div class="stat-label">Minutes Saved</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-co2">912</div>
                            <div class="stat-label">CO₂ Saved (kg)</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="stat-reroutes">318</div>
                            <div class="stat-label">Smart Reroutes</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Routes -->
            <div id="routes" class="grid md-grid-cols-3"></div>
            
            <!-- Community Incidents -->
            <div class="card">
                <div class="card-content">
                    <h3 class="text-lg font-semibold mb-3 flex items-center gap-2">
                        <span style="color: #fb923c;">📍</span> Community Reports
                    </h3>
                    <div id="incidents"></div>
                    <button onclick="openIncidentModal()" class="btn btn-outline mt-3">+ Report Incident</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Incident Modal -->
    <div id="incident-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeIncidentModal()">&times;</span>
            <h2 class="text-xl font-bold mb-3">Report an Incident</h2>
            <label>Incident Type</label>
            <select id="incident-type">
                <option>Heavy Traffic</option>
                <option>Road Construction</option>
                <option>Accident</option>
                <option>Bus Delay</option>
                <option>Weather Hazard</option>
                <option>Other</option>
            </select>
            <label>Location</label>
            <input type="text" id="incident-location" placeholder="e.g., Hwy 403 & Main St">
            <label>Details (Optional)</label>
            <input type="text" id="incident-details" placeholder="Additional information">
            <button onclick="submitIncident()" class="btn btn-primary">Submit Report</button>
        </div>
    </div>

    <script>
        let map, directionsService, directionsRenderer, geocoder, trafficLayer;
        let currentLocation = null;
        let destinationLocation = null;
        let originLocationFromStation = null;
        let activeRouteIndex = null;
        let mapReady = false;
        let userMarker, destinationMarker;
        let defaultBounds = null;
        let originPlace = null;
        let destinationPlace = null;
        let selectedBusTime = null;
        let currentBusSchedule = [];
        
        // Simulated GO Bus schedules (In production, fetch from GO Transit API)
        const goBusSchedules = {
            'Union Station (Toronto)': [
                '06:15', '06:45', '07:15', '07:45', '08:15', '08:45', '09:15', '09:45', 
                '10:15', '10:45', '11:15', '11:45', '12:15', '12:45', '13:15', '13:45',
                '14:15', '14:45', '15:15', '15:45', '16:15', '16:45', '17:15', '17:45',
                '18:15', '18:45', '19:15', '19:45', '20:15', '20:45', '21:15', '21:45', '22:15'
            ],
            'Oakville GO Station': [
                '06:00', '06:30', '07:00', '07:30', '08:00', '08:30', '09:00', '09:30',
                '10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30',
                '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30',
                '18:00', '18:30', '19:00', '19:30', '20:00', '20:30', '21:00', '21:30', '22:00'
            ],
            'Burlington GO Station': [
                '06:10', '06:40', '07:10', '07:40', '08:10', '08:40', '09:10', '09:40',
                '10:10', '10:40', '11:10', '11:40', '12:10', '12:40', '13:10', '13:40',
                '14:10', '14:40', '15:10', '15:40', '16:10', '16:40', '17:10', '17:40',
                '18:10', '18:40', '19:10', '19:40', '20:10', '20:40', '21:10', '21:40', '22:10'
            ],
            'Hamilton GO Centre': [
                '05:45', '06:15', '06:45', '07:15', '07:45', '08:15', '08:45', '09:15',
                '09:45', '10:15', '10:45', '11:15', '11:45', '12:15', '12:45', '13:15',
                '13:45', '14:15', '14:45', '15:15', '15:45', '16:15', '16:45', '17:15',
                '17:45', '18:15', '18:45', '19:15', '19:45', '20:15', '20:45', '21:15', '21:45'
            ],
            'Aldershot GO Station': [
                '06:05', '06:35', '07:05', '07:35', '08:05', '08:35', '09:05', '09:35',
                '10:05', '10:35', '11:05', '11:35', '12:05', '12:35', '13:05', '13:35',
                '14:05', '14:35', '15:05', '15:35', '16:05', '16:35', '17:05', '17:35',
                '18:05', '18:35', '19:05', '19:35', '20:05', '20:35', '21:05', '21:35', '22:05'
            ]
        };
        
        function handleTravelModeChange() {
            const mode = document.getElementById('travel-mode').value;
            const arrivalTimeInput = document.getElementById('arrival-time');
            const busScheduleSelect = document.getElementById('bus-schedule');
            const nextBusesInfo = document.getElementById('next-buses-info');
            
            if (mode === 'catch-bus') {
                arrivalTimeInput.classList.add('hidden');
                busScheduleSelect.classList.remove('hidden');
                busScheduleSelect.classList.add('active');
                nextBusesInfo.classList.remove('hidden');
                updateBusSchedule();
            } else {
                arrivalTimeInput.classList.remove('hidden');
                busScheduleSelect.classList.add('hidden');
                busScheduleSelect.classList.remove('active');
                nextBusesInfo.classList.add('hidden');
            }
        }
        
        function updateBusSchedule() {
            const destinationType = document.getElementById('destination-type').value;
            let stationName = '';
            
            if (destinationType === 'station') {
                const stationSelect = document.getElementById('station-select');
                stationName = stationSelect.options[stationSelect.selectedIndex].text;
            } else {
                const destValue = document.getElementById('destination').value.trim();
                // Try to match custom address to known stations
                Object.keys(goBusSchedules).forEach(station => {
                    if (destValue.toLowerCase().includes(station.toLowerCase().split(' ')[0])) {
                        stationName = station;
                    }
                });
            }
            
            const schedule = goBusSchedules[stationName] || [];
            currentBusSchedule = schedule;
            
            const busScheduleSelect = document.getElementById('bus-schedule');
            busScheduleSelect.innerHTML = '<option value="">-- Select Bus Departure --</option>';
            
            if (schedule.length === 0) {
                busScheduleSelect.innerHTML += '<option value="">No schedule available for this station</option>';
                document.getElementById('upcoming-buses').innerHTML = '<p class="text-gray-500 text-xs">Select a GO station to see bus times</p>';
                return;
            }
            
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            
            let nextBuses = [];
            schedule.forEach(time => {
                const [hours, minutes] = time.split(':').map(Number);
                const timeMinutes = hours * 60 + minutes;
                
                if (timeMinutes >= currentMinutes) {
                    const option = document.createElement('option');
                    option.value = time;
                    option.textContent = `${time} ${timeMinutes === currentMinutes ? '(Now)' : ''}`;
                    busScheduleSelect.appendChild(option);
                    
                    if (nextBuses.length < 3) {
                        nextBuses.push({ time, timeMinutes });
                    }
                }
            });
            
            // Show next 3 buses
            const upcomingBusesDiv = document.getElementById('upcoming-buses');
            upcomingBusesDiv.innerHTML = '';
            
            if (nextBuses.length === 0) {
                upcomingBusesDiv.innerHTML = '<p class="text-gray-500 text-xs">No more buses today</p>';
            } else {
                nextBuses.forEach((bus, index) => {
                    const minutesUntil = bus.timeMinutes - currentMinutes;
                    const div = document.createElement('div');
                    div.className = `bus-time-option ${index === 0 ? 'next-bus' : ''}`;
                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="font-semibold text-sm" style="color: ${index === 0 ? '#22c55e' : '#94a3b8'};">
                                ${index === 0 ? '🚌 Next: ' : ''}${bus.time}
                            </span>
                            <span class="text-xs text-gray-400">in ${minutesUntil} min</span>
                        </div>
                    `;
                    div.onclick = () => {
                        document.getElementById('bus-schedule').value = bus.time;
                        selectedBusTime = bus.time;
                    };
                    upcomingBusesDiv.appendChild(div);
                });
            }
        }
        
        document.getElementById('bus-schedule').addEventListener('change', (e) => {
            selectedBusTime = e.target.value;
        });
        
        const routes = [];
        const userIncidents = [];
        
        // Load stats from localStorage or initialize
        let lifetimeStats = {
            trips: parseInt(localStorage.getItem('gobus_trips')) || 0,
            timeSaved: parseInt(localStorage.getItem('gobus_timeSaved')) || 0,
            co2Saved: parseFloat(localStorage.getItem('gobus_co2Saved')) || 0,
            reroutes: parseInt(localStorage.getItem('gobus_reroutes')) || 0
        };
        
        function saveStats() {
            localStorage.setItem('gobus_trips', lifetimeStats.trips);
            localStorage.setItem('gobus_timeSaved', lifetimeStats.timeSaved);
            localStorage.setItem('gobus_co2Saved', lifetimeStats.co2Saved.toFixed(1));
            localStorage.setItem('gobus_reroutes', lifetimeStats.reroutes);
        }
        
        function updateStatsDisplay() {
            document.getElementById('stat-trips').textContent = lifetimeStats.trips;
            document.getElementById('stat-time').textContent = Math.round(lifetimeStats.timeSaved);
            document.getElementById('stat-co2').textContent = lifetimeStats.co2Saved.toFixed(1);
            document.getElementById('stat-reroutes').textContent = lifetimeStats.reroutes;
        }
        
        // Get current time + 30 minutes as default arrival time
        const now = new Date();
        now.setMinutes(now.getMinutes() + 30);
        document.getElementById('arrival-time').value = now.toTimeString().substring(0, 5);
        
        // Initialize stats display
        updateStatsDisplay();
        
        // Origin/Destination type handlers
        function handleOriginType() {
            const type = document.getElementById('origin-type').value;
            const stationSelect = document.getElementById('origin-station-select');
            const customWrapper = document.getElementById('origin-custom-wrapper');
            const currentWrapper = document.getElementById('origin-current-wrapper');
            
            // Hide all
            stationSelect.classList.add('hidden');
            customWrapper.classList.add('hidden');
            currentWrapper.classList.add('hidden');
            
            // Show selected
            if (type === 'station') {
                stationSelect.classList.remove('hidden');
            } else if (type === 'custom') {
                customWrapper.classList.remove('hidden');
            } else {
                currentWrapper.classList.remove('hidden');
            }
        }
        
        function setOriginStation() {
            const stationSelect = document.getElementById('origin-station-select');
            const coords = stationSelect.value;
            
            if (coords) {
                const [lat, lng] = coords.split(',').map(parseFloat);
                originLocationFromStation = new google.maps.LatLng(lat, lng);
                originPlace = {
                    geometry: { location: originLocationFromStation },
                    name: stationSelect.options[stationSelect.selectedIndex].text
                };
            }
        }
        
        function refreshCurrentLocation() {
            if (navigator.geolocation) {
                document.getElementById('origin-current').value = 'Getting location...';
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        document.getElementById('origin-current').value = 'Current Location';
                        if (userMarker) {
                            userMarker.setPosition(currentLocation);
                            map.panTo(currentLocation);
                        }
                    },
                    () => {
                        alert('Could not get your location. Please enable location services.');
                        document.getElementById('origin-current').value = 'Location unavailable';
                    }
                );
            }
        }
        
        function handleDestinationType() {
            const type = document.getElementById('destination-type').value;
            const stationSelect = document.getElementById('station-select');
            const destinationInput = document.getElementById('destination');
            
            if (type === 'station') {
                stationSelect.classList.remove('hidden');
                destinationInput.classList.add('hidden');
            } else {
                stationSelect.classList.add('hidden');
                destinationInput.classList.remove('hidden');
            }
        }
        
        function setStationDestination() {
            const stationSelect = document.getElementById('station-select');
            const selectedStation = stationSelect.options[stationSelect.selectedIndex];
            const coords = stationSelect.value;
            
            if (coords) {
                const [lat, lng] = coords.split(',').map(parseFloat);
                destinationLocation = new google.maps.LatLng(lat, lng);
                destinationPlace = {
                    geometry: { location: destinationLocation },
                    name: selectedStation.text
                };
                
                // Update destination input with station name (hidden but keeps sync)
                document.getElementById('destination').value = selectedStation.text;
                
                // Update bus schedule when destination changes
                if (document.getElementById('travel-mode').value === 'catch-bus') {
                    updateBusSchedule();
                }
            }
        }
        
        function renderAlerts() {
            const alertsContainer = document.getElementById('alerts');
            alertsContainer.innerHTML = '';
            
            if (routes.length > 0) {
                const travelMode = document.getElementById('travel-mode').value;
                const bestRoute = routes.reduce((best, route) => 
                    route.duration < best.duration ? route : best
                );
                
                if (travelMode === 'catch-bus' && selectedBusTime) {
                    // Calculate when to leave to catch specific bus
                    const [busHours, busMinutes] = selectedBusTime.split(':').map(Number);
                    const busTime = new Date();
                    busTime.setHours(busHours, busMinutes, 0);
                    
                    const transitRoute = routes.find(r => r.mode === 'Transit') || bestRoute;
                    const departureTime = new Date(busTime.getTime() - (transitRoute.duration * 60 * 1000));
                    const leaveTime = departureTime.toTimeString().substring(0, 5);
                    
                    const now = new Date();
                    const minutesUntilDeparture = Math.floor((departureTime - now) / 60000);
                    
                    let alertClass = 'alert-success';
                    let alertIcon = '⏰';
                    let message = `Leave at ${leaveTime} to catch the ${selectedBusTime} bus`;
                    
                    if (minutesUntilDeparture < 0) {
                        alertClass = 'alert-urgent';
                        alertIcon = '⚠️';
                        message = `You've missed the ${selectedBusTime} bus. Select the next one!`;
                    } else if (minutesUntilDeparture < 5) {
                        alertClass = 'alert-urgent';
                        alertIcon = '🏃';
                        message = `Leave NOW to catch the ${selectedBusTime} bus! (${minutesUntilDeparture} min to departure)`;
                    } else if (minutesUntilDeparture < 15) {
                        alertClass = 'alert-info';
                        alertIcon = '⏰';
                        message = `Leave at ${leaveTime} - ${minutesUntilDeparture} minutes until you should depart`;
                    }
                    
                    const alert = document.createElement('div');
                    alert.className = `alert ${alertClass}`;
                    alert.innerHTML = `
                        <span style="font-size: 1.25rem;">${alertIcon}</span>
                        <div>
                            <p class="font-semibold">${message}</p>
                            <p class="text-sm">Bus departs: ${selectedBusTime} • Travel time: ${Math.ceil(transitRoute.duration)} min</p>
                        </div>
                    `;
                    alertsContainer.appendChild(alert);
                } else {
                    // Original arrive-by logic
                    const leaveTime = calculateLeaveTime(bestRoute);
                    const alert = document.createElement('div');
                    alert.className = 'alert alert-success';
                    alert.innerHTML = `
                        <span style="font-size: 1.25rem;">⏰</span>
                        <div>
                            <p class="font-semibold">Leave at ${leaveTime}</p>
                            <p class="text-sm">to catch the ${bestRoute.mode} (arrives ${document.getElementById('arrival-time').value})</p>
                        </div>
                    `;
                    alertsContainer.appendChild(alert);
                }
            }
        }
        
        function calculateLeaveTime(route) {
            const travelMode = document.getElementById('travel-mode').value;
            
            if (travelMode === 'catch-bus' && selectedBusTime) {
                const [busHours, busMinutes] = selectedBusTime.split(':').map(Number);
                const busTime = new Date();
                busTime.setHours(busHours, busMinutes, 0);
                const departure = new Date(busTime.getTime() - (route.duration * 60 * 1000));
                return departure.toTimeString().substring(0, 5);
            } else {
                const arrivalTime = document.getElementById('arrival-time').value;
                if (!arrivalTime) return 'Set arrival time';
                
                const [hours, minutes] = arrivalTime.split(':').map(Number);
                const arrival = new Date();
                arrival.setHours(hours, minutes, 0);
                
                const departure = new Date(arrival.getTime() - (route.duration * 60 * 1000));
                return departure.toTimeString().substring(0, 5);
            }
        }
        
        // Render routes
        function renderRoutes() {
            const routesContainer = document.getElementById('routes');
            routesContainer.innerHTML = '';
            
            if (routes.length === 0) {
                routesContainer.innerHTML = '<div class="card"><div class="card-content text-gray-400 text-center">Enter a destination to see route options</div></div>';
                return;
            }
            
            routes.forEach((route, index) => {
                const card = document.createElement('div');
                card.className = `card route-card ${activeRouteIndex === index ? 'active-route' : ''}`;
                card.onclick = () => startNavigation(index);
                
                const trafficStatus = route.trafficDelay > 10 ? 'High' : route.trafficDelay > 5 ? 'Medium' : 'Low';
                const trafficColor = trafficStatus === 'High' ? 'badge-red' : trafficStatus === 'Medium' ? 'badge-yellow' : 'badge-green';
                
                // Build transit details HTML
                let transitHTML = '';
                if (route.transitDetails && route.transitDetails.length > 0) {
                    transitHTML = '<div style="margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #1e293b;">';
                    transitHTML += '<p class="text-xs font-semibold text-gray-300 mb-2">🚏 Transit Steps:</p>';
                    route.transitDetails.forEach(detail => {
                        const vehicleIcon = detail.type === 'BUS' ? '🚌' : detail.type === 'TRAIN' ? '🚆' : '🚇';
                        transitHTML += `
                            <div style="background: #020617; padding: 0.5rem; border-radius: 0.25rem; margin-bottom: 0.5rem;">
                                <p class="text-sm font-semibold" style="color: #3b82f6;">${vehicleIcon} ${detail.type} ${detail.number}</p>
                                <p class="text-xs text-gray-400">From: ${detail.from}</p>
                                <p class="text-xs text-gray-400">To: ${detail.to}</p>
                                <p class="text-xs text-green-400">⏰ Depart: ${detail.departure} → Arrive: ${detail.arrival}</p>
                            </div>
                        `;
                    });
                    transitHTML += '</div>';
                }
                
                card.innerHTML = `
                    <div class="card-content space-y-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2 text-xl font-semibold">
                                <span style="font-size: 1.5rem;">${route.icon}</span>
                                ${route.mode}
                                ${route.busNumbers.length > 0 ? `<span class="badge badge-green">Buses: ${route.busNumbers.join(', ')}</span>` : ''}
                            </div>
                            ${route.co2 === 0 ? '<span class="badge badge-green">🌿 Zero Carbon</span>' : ''}
                        </div>
                        <div class="space-y-1">
                            <div class="flex items-center gap-2 text-gray-300">
                                <span>⏱️</span>
                                <span class="font-semibold">${Math.ceil(route.duration)} min</span>
                                ${route.trafficDelay > 0 ? `<span class="text-orange-400 text-sm">+${route.trafficDelay} min delay</span>` : ''}
                            </div>
                            <p class="text-gray-400 text-sm">📍 ${route.distance}</p>
                            <p class="text-green-400 text-sm font-semibold">🕐 Leave at: ${calculateLeaveTime(route)}</p>
                        </div>
                        ${transitHTML}
                        <div class="flex items-center justify-between text-sm">
                            <span class="badge ${trafficColor}">
                                🚦 Traffic: ${trafficStatus}
                            </span>
                            <span class="text-gray-400">${route.co2.toFixed(1)} kg CO₂</span>
                        </div>
                        <div class="btn btn-primary" style="text-align: center; cursor: pointer;">
                            ${activeRouteIndex === index ? '🧭 Navigating...' : '🚀 Start Route'}
                        </div>
                    </div>
                `;
                routesContainer.appendChild(card);
            });
        }
        
        // Render incidents
        function renderIncidents() {
            const incidentsContainer = document.getElementById('incidents');
            incidentsContainer.innerHTML = '';
            
            if (userIncidents.length === 0) {
                incidentsContainer.innerHTML = '<p class="text-gray-400 text-sm">No incidents reported yet. Be the first to help the community!</p>';
                return;
            }
            
            userIncidents.forEach(incident => {
                const div = document.createElement('div');
                div.className = 'incident';
                div.innerHTML = `
                    <div>
                        <p class="font-semibold text-sm">${incident.type}</p>
                        <p class="text-gray-400 text-xs">${incident.location}</p>
                        ${incident.details ? `<p class="text-gray-500 text-xs">${incident.details}</p>` : ''}
                    </div>
                    <span class="text-gray-500 text-xs">${incident.time}</span>
                `;
                incidentsContainer.appendChild(div);
            });
        }
        
        // Initialize Google Maps
        window.initMap = function() {
            console.log('Initializing map...');
            
            try {
                // Get user's location
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            currentLocation = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude
                            };
                            initializeMap();
                            document.getElementById('origin-current').value = 'Current Location';
                        },
                        () => {
                            // Default to Hamilton if location denied
                            currentLocation = { lat: 43.2557, lng: -79.8711 };
                            initializeMap();
                            document.getElementById('origin-current').value = 'Current Location (Hamilton fallback)';
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                } else {
                    currentLocation = { lat: 43.2557, lng: -79.8711 };
                    initializeMap();
                    document.getElementById('origin-current').value = 'Current Location (Hamilton fallback)';
                }
            } catch (error) {
                console.error('Error initializing map:', error);
                document.getElementById('map-loading').innerHTML = '<p style="color: #ef4444;">Failed to load map. Please refresh.</p>';
            }
        }
        
        function initializeMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 13,
                center: currentLocation,
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#0f172a" }] },
                    { elementType: "labels.text.stroke", stylers: [{ color: "#0f172a" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#64748b" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#1e293b" }] },
                    { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#94a3b8" }] },
                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#0c1e3d" }] }
                ],
                disableDefaultUI: false,
                zoomControl: true,
                mapTypeControl: false,
                streetViewControl: false
            });
            
            // Define bounds for local bias (GTA/Hamilton/Oakville area)
            defaultBounds = new google.maps.LatLngBounds(
                new google.maps.LatLng(43.0, -80.5),
                new google.maps.LatLng(43.6, -79.5)
            );
            
            // Places Autocomplete for reliable address entry (allows manual typing too)
            const autocompleteOptions = {
                bounds: defaultBounds,
                componentRestrictions: { country: 'ca' },
                types: ['geocode'] // More flexible than 'address' - includes bus stops, landmarks
            };
            
            const originAutocomplete = new google.maps.places.Autocomplete(
                document.getElementById('origin'),
                autocompleteOptions
            );
            originAutocomplete.addListener('place_changed', () => {
                originPlace = originAutocomplete.getPlace();
            });
            
            // Clear originPlace when user starts typing manually
            document.getElementById('origin').addEventListener('input', () => {
                originPlace = null;
            });
            
            const destinationAutocomplete = new google.maps.places.Autocomplete(
                document.getElementById('destination'),
                autocompleteOptions
            );
            destinationAutocomplete.addListener('place_changed', () => {
                destinationPlace = destinationAutocomplete.getPlace();
            });
            
            // Clear destinationPlace when user starts typing manually
            document.getElementById('destination').addEventListener('input', () => {
                destinationPlace = null;
            });
            
            // Add traffic layer
            trafficLayer = new google.maps.TrafficLayer();
            trafficLayer.setMap(map);
            
            // Hide loading, show map
            document.getElementById('map-loading').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            
            // Current location marker
            userMarker = new google.maps.Marker({
                position: currentLocation,
                map: map,
                title: "Current Location",
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10,
                    fillColor: "#22c55e",
                    fillOpacity: 1,
                    strokeWeight: 3,
                    strokeColor: "#ffffff"
                }
            });
            
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false,
                polylineOptions: { strokeColor: "#3b82f6", strokeWeight: 5, strokeOpacity: 0.8 }
            });
            
            geocoder = new google.maps.Geocoder();
            
            mapReady = true;
            console.log('Map initialized successfully');
        }
        
        function calculateRoutes() {
            if (!mapReady) {
                alert('Map is still loading. Please wait.');
                return;
            }
            
            const originType = document.getElementById('origin-type').value;
            const destinationType = document.getElementById('destination-type').value;
            
            let originLatLng = null;
            
            // Handle different origin types
            if (originType === 'current') {
                if (!currentLocation) {
                    alert('Current location not available. Please wait or choose a different option.');
                    return;
                }
                originLatLng = currentLocation;
                handleDestinationAndCalculate(originLatLng);
            } else if (originType === 'station') {
                if (!originLocationFromStation) {
                    alert('Please select a GO station from the dropdown.');
                    return;
                }
                originLatLng = originLocationFromStation;
                handleDestinationAndCalculate(originLatLng);
            } else if (originType === 'custom') {
                const originValue = document.getElementById('origin').value.trim();
                if (!originValue) {
                    alert('Please enter a starting address.');
                    return;
                }
                
                // Use autocomplete if available, otherwise geocode
                if (originPlace && originPlace.geometry && originPlace.geometry.location) {
                    originLatLng = originPlace.geometry.location;
                    handleDestinationAndCalculate(originLatLng);
                } else {
                    geocoder.geocode({
                        address: originValue,
                        bounds: defaultBounds,
                        componentRestrictions: { country: 'ca' }
                    }, (results, status) => {
                        if (status === 'OK') {
                            originLatLng = results[0].geometry.location;
                            handleDestinationAndCalculate(originLatLng);
                        } else {
                            alert('Could not find the origin address "' + originValue + '". Please check the spelling or select from suggestions.');
                        }
                    });
                }
            }
        }
        
        function handleDestinationAndCalculate(originLatLng) {
            const destinationType = document.getElementById('destination-type').value;
            
            // If using station dropdown and already set
            if (destinationType === 'station' && destinationLocation) {
                proceedWithRouteCalculation(originLatLng);
                return;
            }
            
            const destinationValue = document.getElementById('destination').value.trim();
            
            if (!destinationValue && destinationType !== 'station') {
                alert('Please enter a destination.');
                return;
            }
            
            // Handle destination: autocomplete or geocode typed address
            if (destinationPlace && destinationPlace.geometry && destinationPlace.geometry.location) {
                destinationLocation = destinationPlace.geometry.location;
                proceedWithRouteCalculation(originLatLng);
            } else {
                // Geocode manually typed destination address
                geocoder.geocode({
                    address: destinationValue,
                    bounds: defaultBounds,
                    componentRestrictions: { country: 'ca' }
                }, (results, status) => {
                    if (status === 'OK') {
                        destinationLocation = results[0].geometry.location;
                        proceedWithRouteCalculation(originLatLng);
                    } else {
                        alert('Could not find the destination "' + destinationValue + '". Please check the spelling or select from suggestions.');
                    }
                });
            }
        }
        
        function proceedWithRouteCalculation(originLatLng) {
            // Update markers
            userMarker.setPosition(originLatLng);
            map.panTo(originLatLng);
            
            if (destinationMarker) destinationMarker.setMap(null);
            destinationMarker = new google.maps.Marker({
                position: destinationLocation,
                map: map,
                title: document.getElementById('destination').value,
                icon: {
                    path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
                    scale: 8,
                    fillColor: "#ef4444",
                    fillOpacity: 1,
                    strokeWeight: 2,
                    strokeColor: "#ffffff"
                }
            });
            
            // Calculate routes
            routes.length = 0;
            let routesCalculated = 0;
            
            const routeTypes = [
                { mode: 'TRANSIT', name: 'Transit', icon: '🚌', co2Factor: 0.05 },
                { mode: 'DRIVING', name: 'Drive', icon: '🚗', co2Factor: 0.2 },
                { mode: 'BICYCLING', name: 'Bike', icon: '🚴', co2: 0 }
            ];
            
            routeTypes.forEach(routeType => {
                const request = {
                    origin: originLatLng,
                    destination: destinationLocation,
                    travelMode: google.maps.TravelMode[routeType.mode],
                    drivingOptions: routeType.mode === 'DRIVING' ? {
                        departureTime: new Date(),
                        trafficModel: 'bestguess'
                    } : undefined,
                    transitOptions: routeType.mode === 'TRANSIT' ? {
                        departureTime: new Date(),
                        modes: ['BUS', 'TRAIN', 'SUBWAY'],
                        routingPreference: 'FEWER_TRANSFERS'
                    } : undefined
                };
                
                directionsService.route(request, (result, status) => {
                    if (status === 'OK') {
                        const leg = result.routes[0].legs[0];
                        const durationInMinutes = leg.duration.value / 60;
                        const distanceInKm = leg.distance.value / 1000;
                        
                        let trafficDelay = 0;
                        if (leg.duration_in_traffic) {
                            trafficDelay = Math.ceil((leg.duration_in_traffic.value - leg.duration.value) / 60);
                        }
                        
                        let transitDetails = [];
                        let busNumbers = [];
                        if (routeType.mode === 'TRANSIT' && leg.steps) {
                            leg.steps.forEach(step => {
                                if (step.travel_mode === 'TRANSIT' && step.transit) {
                                    const line = step.transit.line;
                                    const vehicle = line.vehicle.type;
                                    const lineName = line.short_name || line.name;
                                    const departure = step.transit.departure_time.text;
                                    const arrival = step.transit.arrival_time.text;
                                    
                                    transitDetails.push({
                                        type: vehicle,
                                        number: lineName,
                                        departure: departure,
                                        arrival: arrival,
                                        from: step.transit.departure_stop.name,
                                        to: step.transit.arrival_stop.name
                                    });
                                    
                                    if (vehicle === 'BUS') {
                                        busNumbers.push(lineName);
                                    }
                                }
                            });
                        }
                        
                        const route = {
                            mode: routeType.name,
                            icon: routeType.icon,
                            duration: durationInMinutes + trafficDelay,
                            distance: leg.distance.text,
                            trafficDelay: trafficDelay,
                            co2: routeType.co2 !== undefined ? routeType.co2 : distanceInKm * routeType.co2Factor,
                            result: result,
                            transitDetails: transitDetails,
                            busNumbers: busNumbers
                        };
                        
                        routes.push(route);
                    }
                    
                    routesCalculated++;
                    if (routesCalculated === routeTypes.length) {
                        routes.sort((a, b) => a.duration - b.duration);
                        renderRoutes();
                        renderAlerts();
                    }
                });
            });
        }
        
        function startNavigation(index) {
            activeRouteIndex = index;
            const route = routes[index];
            
            directionsRenderer.setDirections(route.result);
            document.getElementById('navigation-status').classList.remove('hidden');
            document.getElementById('nav-text').textContent = `🧭 Navigating via ${route.mode} - Leave at ${calculateLeaveTime(route)}`;
            
            // Calculate stats when user starts navigation
            const drivingRoute = routes.find(r => r.mode === 'Drive');
            
            if (route.mode === 'Transit' || route.mode === 'Bike') {
                lifetimeStats.trips++;
                
                if (drivingRoute && route.duration < drivingRoute.duration) {
                    const timeSaved = drivingRoute.duration - route.duration;
                    lifetimeStats.timeSaved += timeSaved;
                }
                
                if (drivingRoute) {
                    const co2Saved = drivingRoute.co2 - route.co2;
                    if (co2Saved > 0) {
                        lifetimeStats.co2Saved += co2Saved;
                    }
                }
                
                if (drivingRoute && drivingRoute.trafficDelay > 5) {
                    lifetimeStats.reroutes++;
                }
                
                saveStats();
                updateStatsDisplay();
                
                const alertsContainer = document.getElementById('alerts');
                const celebrationAlert = document.createElement('div');
                celebrationAlert.className = 'alert alert-success';
                celebrationAlert.innerHTML = `
                    <span style="font-size: 1.25rem;">🎉</span>
                    <div>
                        <p class="font-semibold">Great choice!</p>
                        <p class="text-sm">You're saving ${(drivingRoute.co2 - route.co2).toFixed(1)} kg CO₂ and avoiding traffic!</p>
                    </div>
                `;
                alertsContainer.insertBefore(celebrationAlert, alertsContainer.firstChild);
                setTimeout(() => celebrationAlert.remove(), 5000);
            }
            
            renderRoutes();
        }
        
        function stopNavigation() {
            if (directionsRenderer) {
                directionsRenderer.setDirections({ routes: [] });
            }
            document.getElementById('navigation-status').classList.add('hidden');
            activeRouteIndex = null;
            renderRoutes();
        }
        
        // Incident reporting
        function openIncidentModal() {
            document.getElementById('incident-modal').classList.add('active');
        }
        
        function closeIncidentModal() {
            document.getElementById('incident-modal').classList.remove('active');
        }
        
        function submitIncident() {
            const type = document.getElementById('incident-type').value;
            const location = document.getElementById('incident-location').value;
            const details = document.getElementById('incident-details').value;
            
            if (!location) {
                alert('Please enter a location');
                return;
            }
            
            const now = new Date();
            const timeAgo = 'Just now';
            
            userIncidents.unshift({
                type: type,
                location: location,
                details: details,
                time: timeAgo,
                timestamp: now
            });
            
            lifetimeStats.reroutes++;
            saveStats();
            updateStatsDisplay();
            
            renderIncidents();
            closeIncidentModal();
            
            document.getElementById('incident-location').value = '';
            document.getElementById('incident-details').value = '';
            
            const alertsContainer = document.getElementById('alerts');
            const successAlert = document.createElement('div');
            successAlert.className = 'alert alert-success';
            successAlert.innerHTML = `
                <span style="font-size: 1.25rem;">✅</span>
                <p class="text-sm">Incident reported successfully! Thank you for helping the community avoid delays.</p>
            `;
            alertsContainer.insertBefore(successAlert, alertsContainer.firstChild);
            
            setTimeout(() => successAlert.remove(), 5000);
        }
        
        // Initial render
        renderRoutes();
        renderIncidents();
        
        // Update bus schedules every minute
        setInterval(() => {
            if (document.getElementById('travel-mode').value === 'catch-bus') {
                updateBusSchedule();
            }
        }, 60000);
        
        // Real-time stats counter
        setInterval(() => {
            if (activeRouteIndex !== null) {
                const route = routes[activeRouteIndex];
                if (route && (route.mode === 'Transit' || route.mode === 'Bike')) {
                    lifetimeStats.timeSaved += 1;
                    saveStats();
                    updateStatsDisplay();
                }
            }
        }, 60000);
    </script>
